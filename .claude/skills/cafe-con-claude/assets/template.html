<!DOCTYPE html>
<!--
  Café con Claude — article template.
  Replace every {{PLACEHOLDER}}. Delete the parts you don't need (sources box,
  progress bar, etc.) — they are all optional except the back button and the
  model note near the bottom. Keep the non-negotiables:
    1. The top-left rounded (circular) hamburger (#nav-toggle) opens the nav
       drawer / left rail — the site's standard navigation affordance.
    2. The back control runs history.back() (it is a <button>, not an <a href>).
    3. The <p class="model-note"> at the bottom states the model + effort used.

  The drawer's table of contents ({{TOC}}) must point at the section ids in
  {{BODY}}. Give each <section> an id (id="s1", id="s2", …) and a matching
  <li><a href="#s1">…</a></li> in the TOC so the hamburger menu and the
  scroll-spy highlight work.

  Palette + warm gradient paper are taken from "primero invisible, después
  imparable"; the drawer/menu layout and the round hamburger from "crecer es
  pelear" (Episode 58).
-->
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} · Café con Claude</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    /* palette from "primero invisible, después imparable" */
    --bg:        #f2e8d6;
    --bg-deep:   #ecdfc8;
    --card:      #f9f3e6;
    --card-2:    #f6efdf;
    --ink:       #2d261d;
    --ink-soft:  #5b4f40;
    --ink-faint: #8a7c68;
    --terracotta:#b04e29;
    --rust:      #963c20;
    --amber:     #cf9136;
    --ochre:     #b9853a;
    --olive:     #6c7240;
    --olive-deep:#525830;
    --plum:      #6c3a4f;
    --plum-deep: #502635;
    --line:      #d9cdb8;
    --line-soft: rgba(45,38,29,.07);
    --shadow:    0 1px 2px rgba(45,38,29,.05), 0 14px 38px -22px rgba(45,38,29,.34);
    /* compatibility aliases for older component CSS */
    --cream:     #f2e8d6;
    --muted:     #5b4f40;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, #f7efe0 0%, rgba(247,239,224,0) 60%),
      radial-gradient(900px 700px at -10% 30%, #f0e6d0 0%, rgba(240,230,208,0) 55%),
      var(--bg);
    color: var(--ink);
    font-family: 'Spectral', Georgia, serif;
    line-height: 1.72;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    /* top padding leaves room under the fixed hamburger */
    padding: 4.5rem 1.25rem 5rem;
  }

  /* Reading progress bar (optional) */
  .progress-bar {
    position: fixed; top: 0; left: 0;
    height: 3px; width: 0%;
    background: linear-gradient(90deg, var(--olive), var(--amber), var(--terracotta));
    z-index: 100; transition: width .08s linear;
  }

  /* ── Top-left round hamburger (mobile only) ───────── */
  #nav-toggle {
    display: inline-flex; align-items: center; justify-content: center;
    position: fixed; top: 1rem; left: 1rem; z-index: 80;
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--card); border: 1px solid var(--line);
    cursor: pointer;
    box-shadow: 0 2px 10px rgba(45,38,29,0.12);
  }
  #nav-toggle span,
  #nav-toggle span::before,
  #nav-toggle span::after {
    content: ""; display: block; width: 20px; height: 2px;
    background: var(--ink); border-radius: 2px; transition: transform .3s, background .3s, top .3s;
  }
  #nav-toggle span { position: relative; }
  #nav-toggle span::before { content: ""; position: absolute; left: 0; top: -6px; }
  #nav-toggle span::after  { content: ""; position: absolute; left: 0; top: 6px; }
  #nav-toggle.open span { background: transparent; }
  #nav-toggle.open span::before { top: 0; transform: rotate(45deg); }
  #nav-toggle.open span::after  { top: 0; transform: rotate(-45deg); }

  /* ── Nav drawer / left rail ───────────────────────── */
  nav.sidebar {
    position: fixed; top: 0; left: 0;
    width: 280px; max-width: 82vw; height: 100vh;
    padding: 2.6rem 1.6rem 2rem 2rem;
    display: flex; flex-direction: column;
    background: linear-gradient(180deg, rgba(249,243,230,0.9), rgba(249,243,230,0.45)), var(--bg);
    border-right: 1px solid var(--line-soft);
    overflow-y: auto;
    transform: translateX(-100%);
    transition: transform 0.32s cubic-bezier(.4,0,.2,1);
    z-index: 70; box-shadow: 6px 0 24px rgba(45,38,29,0.14);
  }
  nav.sidebar.open { transform: translateX(0); }
  nav.sidebar .brand {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: 0.78rem; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--terracotta); margin-bottom: 0.2rem;
  }
  nav.sidebar .brand-sub {
    font-size: 0.82rem; font-style: italic; color: var(--ink-soft);
    line-height: 1.4; margin-bottom: 1.9rem;
  }
  nav.sidebar ol { list-style: none; flex: 1; overflow-y: auto; }
  nav.sidebar ol li { margin: 0; }
  nav.sidebar ol a {
    display: flex; align-items: baseline; gap: 0.7rem;
    color: var(--ink-soft); text-decoration: none;
    padding: 0.34rem 0; line-height: 1.32;
    transition: color 0.2s ease;
  }
  nav.sidebar ol a .num {
    font-family: 'Fraunces', serif; font-weight: 600;
    letter-spacing: 0.05em; color: var(--ink-faint);
    min-width: 2.1em; flex-shrink: 0; font-variant-numeric: tabular-nums;
  }
  nav.sidebar ol a:hover { color: var(--ink); }
  nav.sidebar ol a.active { color: var(--terracotta); font-weight: 600; }
  nav.sidebar ol a.active .num { color: var(--terracotta); }
  /* home tool pinned at the foot of the rail */
  nav.sidebar .rail-tools {
    border-top: 1px solid var(--line); padding-top: 1.1rem; margin-top: 1rem;
  }
  nav.sidebar .rail-tools .home {
    color: var(--ink-soft); text-decoration: none; letter-spacing: 0.02em;
    transition: color 0.2s ease;
  }
  nav.sidebar .rail-tools .home:hover { color: var(--terracotta); }

  #nav-scrim {
    position: fixed; inset: 0; background: rgba(45,38,29,0.4);
    opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 65;
  }
  #nav-scrim.open { opacity: 1; pointer-events: auto; }

  /* ── Origin chip ──────────────────────────────────────
     States which question-batch the page came from; mirrors the origin filter
     in index.html. Fixed top-right, so it never collides with the top-left ☰. */
  .origin-chip {
    position: fixed; top: 10px; right: 10px; z-index: 90;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase;
    color: var(--muted); background: var(--card);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 5px 11px; text-decoration: none; line-height: 1;
    box-shadow: 0 1px 5px rgba(45,38,29,0.10);
  }
  .origin-chip.origin-f14  { color: var(--terracotta); border-color: var(--terracotta); }
  .origin-chip.origin-f25  { color: var(--olive);      border-color: var(--olive); }
  .origin-chip.origin-f100 { color: var(--plum);       border-color: var(--plum); }
  .origin-chip.origin-casa { color: var(--muted);      border-color: var(--line); }

  .wrap { max-width: 720px; margin: 0 auto; }

  /* Back control — browser history, not a hard link. */
  .back-link {
    display: inline-block;
    font-family: 'Spectral', serif; font-size: 0.85rem;
    color: var(--terracotta);
    background: none; border: none;
    border-bottom: 1px solid var(--terracotta);
    padding: 0 0 1px; margin-bottom: 2.2rem; cursor: pointer;
  }
  .back-link:hover { color: var(--ink); border-color: var(--ink); }

  header .eyebrow {
    font-family: 'Spectral', serif; font-style: italic;
    font-size: 15px; color: var(--terracotta); letter-spacing: 0.06em;
    display: block; margin: 0 0 22px;
  }
  header .eyebrow::after {
    content: ""; display: block; width: 46px; height: 1px;
    background: var(--terracotta); opacity: 0.5; margin-top: 14px;
  }
  header h1 {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-optical-sizing: 144;
    font-size: clamp(42px, 8vw, 72px); line-height: 1.02; letter-spacing: -0.018em;
    margin: 0 0 6px; color: var(--ink);
  }
  header h1 em { font-style: italic; font-weight: 500; color: var(--rust); }
  .subtitle {
    font-size: 21px; line-height: 1.5; color: var(--ink-soft);
    font-weight: 400; max-width: 30ch; margin: 18px 0 0;
  }
  .subtitle b { color: var(--ink); font-weight: 600; }

  main { margin-top: 2.6rem; }
  section { margin-bottom: 2.4rem; scroll-margin-top: 1.5rem; }
  section h2 {
    font-family: 'Fraunces', serif; font-weight: 700;
    font-size: clamp(1.5rem, 4vw, 2rem); line-height: 1.15; margin: 0 0 0.6rem;
  }
  p { margin-bottom: 1.1rem; }
  a { color: var(--terracotta); }
  em { color: var(--ink); }

  /* Sources box (optional) */
  .fuentes {
    margin-top: 3rem; padding: 1.1rem 1.3rem;
    border-left: 4px solid var(--terracotta);
    background: rgba(176, 78, 41, 0.06); font-size: 0.9rem;
  }
  .fuentes strong { font-family: 'Fraunces', serif; }
  .fuentes a { text-decoration: none; border-bottom: 1px solid rgba(176,78,41,0.4); }
  .fuentes a:hover { color: var(--ink); border-color: var(--ink); }

  footer {
    margin-top: 3.5rem; padding-top: 1.5rem;
    border-top: 1px solid var(--line);
    font-size: 0.85rem; font-style: italic; color: var(--ink-soft); text-align: center;
  }
  .model-note {
    margin-top: 0.8rem;
    font-family: 'Fraunces', serif; font-size: 0.72rem; letter-spacing: 0.04em;
    color: var(--ink-faint); opacity: 0.9; text-align: center;
  }

  .revela { opacity: 0; transform: translateY(14px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .revela.visible { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .revela { opacity: 1; transform: none; transition: none; }
    nav.sidebar, #nav-scrim, #nav-toggle span, #nav-toggle span::before, #nav-toggle span::after { transition: none; }
  }

  /* Desktop: dock the drawer as a fixed left rail; the hamburger is mobile-only.
     Breakpoint kept low (1000px) so laptops running OS display-scaling — which
     report a CSS width well below their physical pixels — still get the rail. */
  @media (min-width: 1000px) {
    #nav-toggle, #nav-scrim { display: none; }
    nav.sidebar, nav.sidebar.open {
      transform: none; box-shadow: none;
      background: linear-gradient(180deg, rgba(249,243,230,0.55), rgba(249,243,230,0));
    }
    .wrap { margin-left: max(324px, calc(50% - 360px)); margin-right: auto; }
  }
  @media (min-width: 1500px) {
    .wrap { margin: 0 auto; }
  }

  @media (max-width: 640px) {
    body { padding: 4.2rem 1rem 4rem; }
  }
</style>
</head>
<body>
<div class="progress-bar" id="progressBar"></div>

<!-- Origin chip: which question-batch this page came from. Default is a house
     original ("De la casa"). If it descends from a Fable batch, swap the label
     and class: Fable-14/origin-f14, Fable-25/origin-f25, Fable-100/origin-f100. -->
<a href="index.html" class="origin-chip {{ORIGIN_CLASS}}" title="{{ORIGIN_TITLE}}">{{ORIGIN_LABEL}}</a>

<!-- Top-left round hamburger + off-canvas drawer / left rail -->
<button id="nav-toggle" type="button" aria-label="Abrir índice" aria-expanded="false" aria-controls="sidebar"><span></span></button>
<div id="nav-scrim"></div>
<nav class="sidebar" id="sidebar" aria-label="Índice de la página">
  <div class="brand">{{BRAND}}</div>
  <div class="brand-sub">{{SERIES}}</div>
  <ol class="toc">
    {{TOC}}
    <!-- e.g. <li><a href="#s1"><span class="num">I</span>Section title</a></li> -->
  </ol>
  <div class="rail-tools">
    <a class="home" href="index.html">← Índice</a>
  </div>
</nav>

<div class="wrap">

  <!-- Back control: browser history back, with a graceful fallback to the index
       only when there is no history to go back to (e.g. opened in a fresh tab). -->
  <button class="back-link" type="button"
          onclick="if (history.length > 1) { history.back(); } else { location.href = 'index.html'; }">
    ← {{BACK_LABEL}}
  </button>

  <header>
    <span class="eyebrow">{{EYEBROW}}</span>
    <h1>{{H1}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
  </header>

  <main>
    {{BODY}}
  </main>

  <div class="fuentes revela">
    <strong>Fuentes:</strong> {{SOURCES}}
  </div>

  <footer>{{FOOTER_LINE}}
    <p class="model-note">{{MODEL_NOTE}}</p>
  </footer>

</div>

<script>
  // Reading progress bar
  var bar = document.getElementById('progressBar');
  if (bar) {
    var onScroll = function () {
      var doc = document.documentElement;
      var total = doc.scrollHeight - window.innerHeight;
      bar.style.width = (total > 0 ? (window.scrollY / total) * 100 : 0) + '%';
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    onScroll();
  }

  // Hamburger drawer (round toggle morphs to ✕ via the .open class)
  var toggle = document.getElementById('nav-toggle');
  var sidebar = document.getElementById('sidebar');
  var scrim = document.getElementById('nav-scrim');
  function setNav(open) {
    sidebar.classList.toggle('open', open);
    scrim.classList.toggle('open', open);
    toggle.classList.toggle('open', open);
    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    toggle.setAttribute('aria-label', open ? 'Cerrar índice' : 'Abrir índice');
  }
  toggle.addEventListener('click', function () { setNav(!sidebar.classList.contains('open')); });
  scrim.addEventListener('click', function () { setNav(false); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') setNav(false); });

  // Scroll-spy: highlight the current section in the drawer, close on link click
  var links = document.querySelectorAll('nav.sidebar .toc a');
  var byId = {};
  links.forEach(function (l) {
    byId[l.getAttribute('href').slice(1)] = l;
    l.addEventListener('click', function () { setNav(false); });
  });
  var spy = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting) {
        links.forEach(function (l) { l.classList.remove('active'); });
        var lnk = byId[e.target.id];
        if (lnk) lnk.classList.add('active');
      }
    });
  }, { rootMargin: '-30% 0px -60% 0px' });
  document.querySelectorAll('main section[id]').forEach(function (s) { spy.observe(s); });

  // Reveal sections on scroll (respects prefers-reduced-motion)
  var revelables = document.querySelectorAll('.revela');
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    revelables.forEach(function (el) { el.classList.add('visible'); });
  } else {
    var obs = new IntersectionObserver(function (entries) {
      entries.forEach(function (en) {
        if (en.isIntersecting) { en.target.classList.add('visible'); obs.unobserve(en.target); }
      });
    }, { threshold: 0.12 });
    revelables.forEach(function (el) { obs.observe(el); });
  }
</script>
</body>
</html>
